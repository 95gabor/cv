services:
  cv:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - host.docker.internal:host-gateway
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://95gabor.me}
      secrets:
        - supabase_url
        - supabase_publishable_key
    image: ghcr.io/95gabor/cv:latest
    ports:
      - '8000:80'

secrets:
  supabase_url:
    environment: SUPABASE_URL
  supabase_publishable_key:
    environment: SUPABASE_PUBLISHABLE_KEY
