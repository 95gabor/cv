name: Node bootstrap
description: Setup pnpm, Node.js, and install dependencies

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "24.18.0"
  pnpm-version:
    description: pnpm version to install
    required: false
    default: "11.12.0"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare "pnpm@${{ inputs.pnpm-version }}" --activate
        pnpm --version

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
