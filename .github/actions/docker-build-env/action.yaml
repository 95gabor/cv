name: Docker build env
description: Start local Supabase and write secret files for CI Docker validation (not publish)

outputs:
  supabase_url_file:
    description: Path to supabase URL secret file for Docker build
    value: ${{ steps.secrets.outputs.supabase_url_file }}
  supabase_publishable_key_file:
    description: Path to publishable key secret file for Docker build
    value: ${{ steps.secrets.outputs.supabase_publishable_key_file }}

runs:
  using: composite
  steps:
    - name: Prepare Supabase
      shell: bash
      run: bash scripts/prepare-supabase-for-build.sh

    - name: Write Docker build secret files
      id: secrets
      shell: bash
      env:
        DOCKER_SUPABASE_URL: http://host.docker.internal:54321
      run: bash scripts/write-docker-build-secrets.sh
