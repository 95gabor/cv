name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup context
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Node
        uses: ./.github/actions/node-bootstrap

  release:
    name: Run semantic release
    needs: setup
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap Node
        uses: ./.github/actions/node-bootstrap

      - name: Generate new releases
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_GITHUB_TOKEN }}
