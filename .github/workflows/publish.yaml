name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RUNNER_IMAGE: &runner-image ubuntu-24.04
  DOCKER_BUILD_CACHE_SCOPE: cv-docker-build
  NEXT_PUBLIC_SITE_URL: https://95gabor.me

jobs:
  supabase-migrate:
    name: Apply Supabase migrations (prod)
    runs-on: *runner-image
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap Node
        uses: ./.github/actions/node-bootstrap

      - name: Push migrations to production
        run: bash scripts/supabase-push-prod.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  docker-image:
    name: Publish Docker image
    needs: supabase-migrate
    runs-on: *runner-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Write Docker build secret files
        id: docker_secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || vars.SUPABASE_PUBLISHABLE_KEY }}
        run: bash scripts/write-docker-build-secrets.sh

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
          secret-files: |
            supabase_url=${{ steps.docker_secrets.outputs.supabase_url_file }}
            supabase_publishable_key=${{ steps.docker_secrets.outputs.supabase_publishable_key_file }}
          cache-from: type=gha,scope=${{ env.DOCKER_BUILD_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DOCKER_BUILD_CACHE_SCOPE }}
          platforms: |
            linux/amd64
            linux/arm64

  pages:
    name: Publish GitHub Pages
    needs: supabase-migrate
    runs-on: *runner-image
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || vars.SUPABASE_PUBLISHABLE_KEY }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bootstrap Node
        uses: ./.github/actions/node-bootstrap

      - name: Generate static site (prod Supabase)
        run: bash scripts/prepare-static-site-prod.sh

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
