name: PR visual regression (Percy)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  percy:
    runs-on: ubuntu-24.04
    env:
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Percy visual snapshot tests
        run: npm run test:e2e:visual:ci

      - name: Upload full-page screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-full-page-screenshot
          path: artifacts/screenshots/*.png
          if-no-files-found: error
          retention-days: 7

      - name: Comment screenshot on pull request
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: opengisch/comment-pr-with-images@0.0.5
        with:
          images: artifacts/screenshots/*.png
